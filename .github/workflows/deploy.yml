name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SANITY_WRITE_TOKEN: ${{ secrets.VITE_SANITY_WRITE_TOKEN }}
          VITE_SANITY_STUDIO_URL: ${{ secrets.VITE_SANITY_STUDIO_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
        run: npm run build

      - name: Install rsync + sshpass
        run: sudo apt-get install -y rsync sshpass

      - name: Deploy via rsync over SSH
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:public_html/
