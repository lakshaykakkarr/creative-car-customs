name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SANITY_WRITE_TOKEN: ${{ secrets.VITE_SANITY_WRITE_TOKEN }}
          VITE_SANITY_STUDIO_URL: ${{ secrets.VITE_SANITY_STUDIO_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_USER: ${{ secrets.SSH_USERNAME }}
          SFTP_PASS: ${{ secrets.SSH_PASSWORD }}
          SFTP_HOST: ${{ secrets.SSH_HOST }}
        run: |
          lftp -e "set sftp:auto-confirm yes; set net:max-retries 3; mirror -R --delete dist/ public_html/; quit" \
            "sftp://${SFTP_USER}:${SFTP_PASS}@${SFTP_HOST}:65002"
