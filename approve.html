<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Feedback — Creative Car Customs</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
</head>
<body class="grain">

  <div class="glass-ambient">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Minimal header -->
  <nav class="navbar" id="navbar" style="position:fixed;">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="#e11d48" stroke-width="2"/>
          <text x="20" y="25" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="900" fill="#f5f5f5">CCC</text>
        </svg>
        <span>Creative<span class="logo-accent">Car</span>Customs</span>
      </a>
    </div>
  </nav>

  <!-- Approve / Discard panel -->
  <main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:7rem 1.5rem 4rem;">
    <div style="width:100%;max-width:540px;">

      <!-- Loading state -->
      <div id="approveLoading" class="card" style="padding:3rem;text-align:center;">
        <div style="width:48px;height:48px;border:3px solid var(--border-glass);border-top-color:var(--accent);border-radius:50%;margin:0 auto 1.5rem;animation:spin 0.8s linear infinite;"></div>
        <p style="color:var(--text-secondary);">Loading feedback details…</p>
      </div>

      <!-- Feedback details + action -->
      <div id="approvePanel" class="card" style="padding:2.5rem;display:none;">
        <div id="approveActionBadge" style="display:inline-flex;align-items:center;gap:0.5rem;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:1.5rem;padding:0.35rem 0.85rem;border-radius:99px;border:1px solid var(--border-glass);">
          <!-- Filled by JS -->
        </div>
        <h2 style="font-size:1.5rem;margin-bottom:0.25rem;" id="approveTitle"><!-- Filled by JS --></h2>
        <p style="color:var(--text-secondary);font-size:0.875rem;margin-bottom:2rem;" id="approveSubtitle"><!-- Filled by JS --></p>

        <!-- Review card -->
        <div style="background:var(--bg-glass-strong);border:1px solid var(--border-glass);border-radius:var(--radius-md);padding:1.25rem;margin-bottom:2rem;">
          <div id="approveStars" style="margin-bottom:0.75rem;color:var(--accent);font-size:1.25rem;letter-spacing:2px;"></div>
          <blockquote id="approveQuote" style="font-size:0.95rem;color:var(--text-primary);line-height:1.75;margin:0 0 1rem;font-style:italic;"></blockquote>
          <div style="display:flex;flex-wrap:wrap;gap:0.5rem 1.5rem;font-size:0.8rem;color:var(--text-secondary);">
            <span id="approveMeta1"></span>
            <span id="approveMeta2"></span>
            <span id="approveMeta3"></span>
          </div>
        </div>

        <button id="approveConfirmBtn" class="btn btn-primary" style="width:100%;justify-content:center;font-size:1rem;">
          <!-- Filled by JS -->
        </button>
        <a href="index.html" class="btn btn-outline" style="width:100%;justify-content:center;margin-top:0.75rem;">Cancel — Go to Homepage</a>
      </div>

      <!-- Success state -->
      <div id="approveSuccess" class="card" style="padding:3rem;text-align:center;display:none;">
        <div style="width:80px;height:80px;background:rgba(225,29,72,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#e11d48" stroke-width="2.5" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <h3 id="approveSuccessTitle" style="font-size:1.5rem;color:var(--text-primary);margin-bottom:0.5rem;"></h3>
        <p id="approveSuccessMsg" style="color:var(--text-secondary);margin-bottom:1.5rem;"></p>
        <a href="index.html" class="btn btn-primary" style="display:inline-flex;">Back to Homepage</a>
      </div>

      <!-- Error state -->
      <div id="approveError" class="card" style="padding:3rem;text-align:center;display:none;">
        <div style="width:80px;height:80px;background:rgba(225,29,72,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#e11d48" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </div>
        <h3 style="font-size:1.25rem;color:var(--text-primary);margin-bottom:0.5rem;">Something went wrong</h3>
        <p id="approveErrorMsg" style="color:var(--text-secondary);margin-bottom:1.5rem;"></p>
        <a href="index.html" class="btn btn-outline" style="display:inline-flex;">Back to Homepage</a>
      </div>

    </div>
  </main>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script type="module" src="src/js/approve.js"></script>
</body>
</html>
